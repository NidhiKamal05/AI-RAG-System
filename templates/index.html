<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>RAG pyBot</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
		<style>
			#chat-box {
				height: 60vh ;
				overflow-y: auto ;
				border: 1px solid #ddd ;
				padding: 10px ;
				background: #fff ;
			}
			.loader {
				font-style: italic ;
				color: #6c757d ;
			}
		</style>
	</head>
	<body class="bg-light>
		<div class="container py-4">
			<h3 class="text-center mb-3">RAG pyBot</h3>
			
			<div class="card shadow">
				<div class="card-body">
					<div id="chat_box" class="mb-3">
						
					</div>
					<div class="input-group">
						<input id="query_input" type="text" class="form-control" placeholder="Type your query...">
						<button id="send_btn" class="btn btn-primary">Send</button>
					</div>
				</div>
			</div>
		</div>
		
		<script type="module" src="/static/js/chat.js"></script>
	</body>
</html>
